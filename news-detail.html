      <p>本次获批的两款产品——压缩空气式雾化器与便携式吸痰器，是星米医疗研发团队针对临床痛点进行的定向创新。产品设计融合了两项国家专利技术的核心优势，在确保医疗级治疗效果的同时，大幅提升了用户使用的便捷性与舒适度。</p>
      
      <div class="highlight-box">
        <p>专利技术的应用，有效解决了传统雾化颗粒不均、吸痰操作复杂等行业难题，体现了星米医疗在呼吸类医疗器械领域的深厚技术积累。</p>
      </div>

      <h3>产品矩阵：完善呼吸健康生态关键拼图</h3>
      <p><strong>压缩空气式雾化器：</strong>采用高效雾化技术，能够将药液破碎成微小颗粒，直达病灶，适用于哮喘、慢阻肺（COPD）等呼吸道疾病的长期居家管理。</p>
      <p><strong>便携式吸痰器：</strong>针对术后康复、老年护理及急救场景设计，轻巧便携，有效清除呼吸道分泌物，保障气道通畅。</p>
      <p>这两款产品的上市，使得星米医疗能够为医疗机构及家庭用户提供更加系统化、场景化的呼吸健康解决方案。</p>

      <h3>战略意义：深化呼吸赛道全产业链布局</h3>
      <p>星米医疗相关负责人表示："2022年是星米医疗呼吸健康战略全面落地的重要年份。压缩空气式雾化器和便携式吸痰器的获批，不仅丰富了我们的产品线，更验证了我们'以用户为中心'的研发理念。未来，星米医疗将继续依托自主研发实力，深耕呼吸治疗领域，推动国产医疗器械的创新与升级。"</p>
    `
  },
  "202209": {
    title: "星米医疗鼻腔护理赛道再获突破：电动气雾洗鼻器获批上市",
    date: "2022年9月",
    body: `
      <p>2022年9月，星米医疗自主研发的电动气雾洗鼻器正式获得医疗器械注册证。该产品集成了两项国家专利技术与一项软件著作权，标志着星米医疗在鼻腔冲洗技术与智能化控制领域实现了双重突破，进一步完善了公司在上呼吸道健康管理领域的产品矩阵。</p>

      <h3>技术驱动：软硬结合构建产品壁垒</h3>
      <p>本次获批的电动气雾洗鼻器，是星米医疗在耳鼻喉（ENT）护理领域的拳头产品。区别于传统洗鼻设备，该产品依托两项核心专利技术及一项专用软件著作权，实现了软硬件的深度协同。</p>

      <div class="highlight-box">
        <p>软件算法的加持，使设备能够根据不同人群的耐受度智能调节冲洗压力与气雾量，解决了传统洗鼻过程中存在的呛水、疼痛及操作复杂等痛点，显著提升了临床护理的有效性与患者的舒适度。</p>
      </div>

      <h3>场景延伸：完善上呼吸道健康闭环</h3>
      <p>随着电动气雾洗鼻器的上市，星米医疗成功打通了"鼻腔清洁—气道给药—痰液管理"的上呼吸道全周期护理链条。该产品广泛适用于过敏性鼻炎、鼻窦炎术后护理及日常鼻腔卫生维护，满足了医院门诊、家庭护理及差旅出行等多场景下的使用需求。至此，星米医疗已拥有覆盖鼻腔、咽喉到下呼吸道的完整呼吸健康解决方案。</p>

      <h3>持续创新：强化知识产权核心竞争力</h3>
      <p>知识产权的积累是企业创新能力的试金石。截至2022年9月，星米医疗在呼吸与护理领域的专利及软著储备持续增加。公司始终坚持"研发一代、注册一代、储备一代"的产品策略，通过持续的科研投入，推动国产医疗器械在细分领域的迭代升级。</p>
    `
  },
  "202211": {
    title: "星米医疗质量管理体系获国际级认可，通过CMD认证",
    date: "2022年11月",
    body: `
      <p>2022年11月，星米医疗正式通过北京国医械华光认证有限公司（CMD）的严格审核，荣获医疗器械质量管理体系认证证书。这一权威资质的获取，标志着星米医疗在医疗器械设计开发、生产、销售及售后服务全流程的质量管控能力已达到国家标准及国际通用规范要求。</p>

      <h3>权威背书：CMD认证彰显体系化管控实力</h3>
      <p>北京国医械华光认证有限公司（CMD）作为国家药监局认可的权威认证机构，其颁发的认证是医疗器械行业公认的质量管理标准。本次审核范围全面覆盖了星米医疗的质量管理体系，证实其在压缩空气式雾化器、网式雾化器、便携式吸痰器、家用保健制氧机、电动气雾洗鼻器等核心产品的全生命周期管理中，具备高度规范化与风险受控的能力。</p>

      <div class="highlight-box">
        <p>此次认证充分证明了星米医疗质量体系的稳定性与可持续性，为"星米制造"品质提供了有力背书。</p>
      </div>

      <h3>合规基石：赋能呼吸健康生态高质量发展</h3>
      <p>质量管理体系认证是产品安全性和有效性的根本保障，将直接助力公司：<strong>提升产品竞争力</strong>——确保每一台出厂设备均符合严格的医疗安全标准；<strong>强化市场准入</strong>——为后续拓展国内外高端市场及招标采购提供必备资质；<strong>优化内部管理</strong>——通过PDCA循环，持续提升运营效率与客户满意度。</p>

      <h3>战略承诺：坚守质量生命线</h3>
      <p>星米医疗管理层表示："质量是医疗器械企业的生命线。此次通过质量管理体系认证，是星米医疗发展历程中的又一重要里程碑。我们将以此为契机，严格执行质量管理体系标准，将'合规、优质、高效'的理念贯穿于每一个环节，持续为医患提供安全、可靠的呼吸健康解决方案。"</p>
    `
  },
  "202305": {
    title: "星米医疗深耕东盟：雾化器、吸痰器获越南MOH注册证，呼吸健康方案落地越南",
    date: "2023年5月",
    body: `
      <p>2023年5月，星米医疗（Xingmi Medical）宣布其自主研发的压缩空气式雾化器、便携式吸痰器等核心产品，正式获得越南卫生部（MOH）颁发的医疗器械注册证。此举标志着星米医疗成功打通越南市场准入通道，公司呼吸健康生态产品在东南亚区域化布局中再下一城，将为越南当地医患提供高品质的本土化医疗解决方案。</p>

      <h3>合规准入：严苛标准下的"中国智造"</h3>
      <p>越南市场对进口医疗器械的质量、安全性及临床有效性设有严格的监管门槛。星米医疗本次获批的产品线，依托此前获得的质量管理体系认证及多项国家专利背书，顺利通过了越南监管机构的全面技术审评。</p>

      <div class="highlight-box">
        <p>这不仅是星米医疗产品合规性的有力证明，更为公司后续在东盟地区的多国注册建立了可复制的合规路径。</p>
      </div>

      <h3>产品矩阵：精准匹配基层医疗与家庭护理需求</h3>
      <p>针对越南市场呼吸系统疾病高发及基层医疗资源分布的特点，星米医疗针对性地输出了"治疗+护理"的组合拳：</p>
      <p><strong>压缩空气式雾化器：</strong>凭借高效雾化率与药物利用率，助力基层诊所提升哮喘、慢阻肺等常见病的门诊治疗水平。</p>
      <p><strong>便携式吸痰器：</strong>满足家庭护理及转运途中的气道管理需求，降低术后患者及老年群体的呼吸道并发症风险。</p>
      <p>这一产品组合的落地，将有效提升越南在呼吸急症救治与慢病康复领域的硬件水平。</p>

      <h3>区域战略：以点带面，辐射RCEP市场</h3>
      <p>"越南是我们在东盟布局的第二个关键支点。"星米医疗海外事业部负责人表示，"越南市场的开拓，得益于RCEP协定带来的贸易便利化。我们将以此为契机，加快在马来西亚、印尼等周边国家的注册步伐，构建覆盖东盟的营销与服务网络，让更多'星米制造'惠及全球患者。"</p>
    `
  },
  "202309": {
    title: "星米医疗加速出海：制氧机等核心产品获泰国FDA注册，正式进军东南亚市场",
    date: "2023年9月",
    body: `
      <p>2023年9月，星米医疗宣布其核心产品——制氧机系列等多产品正式获得泰国食品药品监督管理局（TFDA）的市场准入资格。这标志着星米医疗在东南亚市场的战略布局取得关键性突破，公司将以此为支点，向泰国及东盟地区输出高品质的呼吸健康解决方案。</p>

      <h3>准入破局：高标准通过TFDA认证</h3>
      <p>泰国作为东盟地区的医疗中心，对进口医疗器械的质量与合规性有着严苛的审核标准。星米医疗制氧机凭借稳定的分子筛制氧技术、优异的临床性能表现以及完善的ISO 13485质量管理体系背书，成功通过了TFDA的技术评审与注册核准。</p>

      <div class="highlight-box">
        <p>此次获批不仅证明了星米医疗的产品质量已达到国际主流市场准入门槛，也为后续其他产品在海外市场的注册积累了宝贵经验。</p>
      </div>

      <h3>产品赋能：缓解区域呼吸治疗需求</h3>
      <p>随着泰国及周边地区人口老龄化加剧及呼吸道疾病管理需求的上升，医用及家用制氧设备的市场潜力巨大。星米医疗此次进入泰国市场的制氧机产品，具备高精度流量控制、静音运行及智能监控等技术特点，能够有效满足当地医院临床救治、社区康复中心及家庭长期氧疗等多层次场景的需求。</p>

      <h3>全球视野：深耕东盟，辐射全球</h3>
      <p>"2023年是星米医疗国际化战略的启航之年。"星米医疗国际市场部负责人表示，"泰国市场的突破是我们全球化布局的第一步。我们将充分利用RCEP政策红利，结合当地渠道合作伙伴的优势，快速建立售后服务体系与品牌认知。未来，星米医疗将持续把更多拥有自主知识产权的呼吸健康产品推向全球，打造世界级的国产医疗器械品牌。"</p>
    `
  },
  "202403": {
    title: "星米医疗二期生产基地正式投产：产能提升150%，智能制造赋能呼吸健康生态",
    date: "2024年3月",
    body: `

      <h3>产能跃迁：智能化产线支撑全球交付</h3>
      <p>随着二期工程的落地，星米医疗引入了多条行业领先的自动化组装线与高精度检测设备。产能提升150%的核心驱动力在于生产流程的数字化改造与精益化管理。</p>

      <div class="highlight-box">
        <p>这一举措确保了在大规模量产的前提下，压缩空气式雾化器、便携式吸痰器、制氧机等核心产品依然能保持高标准的品质一致性，有效支撑了公司在泰国、越南等海外新兴市场的爆发式增长需求。</p>
      </div>

      <h3>前瞻布局：为新品孵化预留战略空间</h3>

      <h3>制造升级：构建绿色化、数字化工厂</h3>

    `
  },
  "202404": {
    title: "行业领跑！星米医疗斩获新标准下首张制氧机注册证，五项专利一项软著构筑技术护城河",
    date: "2024年4月",
    body: `
      <p>2024年4月，星米医疗（Xingmi Medical）自主研发的制氧机产品正式获得医疗器械注册证。值得一提的是，该证是行业实施新标准后签发的首张制氧机注册证，具有里程碑意义。该产品集成了五项国家专利技术与一项软件著作权，不仅彰显了星米医疗在呼吸治疗领域的深厚研发底蕴，更为其在全球氧疗市场的合规竞争抢占了战略先机。</p>

      <h3>标准领跑：抢占新规下市场准入制高点</h3>
      <p>随着医疗器械监管要求的不断升级，制氧机行业迎来了更为严苛的新标准。星米医疗凭借对法规政策的敏锐洞察与前瞻布局，率先通过新标考核，成功拿下新规实施后的首张注册证。</p>

      <div class="highlight-box">
        <p>这一成就不仅体现了星米医疗在产品合规性上的绝对实力，更意味着其制氧机产品在电气安全、电磁兼容及性能指标上均已达到行业最高要求，为后续市场推广扫清了障碍。</p>
      </div>

      <h3>硬核研发：五专利一软著定义智能氧疗技术</h3>
      <p>创新是星米医疗的核心基因。本次获批的制氧机产品，搭载了5项核心专利与1项软件著作权，实现了软硬件的双重突破。</p>
      <p><strong>硬件端：</strong>通过专利分子筛吸附技术，显著提升了氧气浓度稳定性与产氧效率。</p>
      <p><strong>软件端：</strong>依托智能控制系统，实现了氧浓度实时监测、流量精准调节及远程运维功能。</p>
      <p>这种"硬科技+软实力"的组合，有效解决了传统制氧机能耗高、噪音大、数据不可控等临床痛点，重新定义了家用及医用制氧体验。</p>

      <h3>产能协同：二期基地护航新品放量</h3>
      <p>结合2024年3月刚投产的二期工程（产能提升150%），星米医疗已做好充分准备迎接新品的批量交付。公司负责人表示："首张新标注册证的落地，叠加二期基地的产能释放，标志着星米医疗在制氧机赛道已具备'技术+制造'的双轮驱动能力。我们将以此为契机，加速推进产品在国内外市场的全覆盖，让更多患者享受到'中国智造'的高品质氧疗服务。"</p>
    `
  },
  "20240411": {
    title: "星米医疗携新品制氧机及呼吸类产品亮相第89届CMEF（上海），首张新标准制氧机注册证产品面向渠道与临床首发展示",
    date: "2024年4月11日–14日",
    body: `
      <p>2024年4月11日至14日，第89届中国国际医疗器械（春季）博览会（CMEF）在上海国家会展中心盛大举行。星米医疗携呼吸健康生态产品线（含新品制氧机、压缩空气式雾化器、便携式吸痰器、电动气雾洗鼻器等）集中亮相，完成从"单品合规"到"呼吸生态"的一次重要展示。</p>

      <p>尤其受到渠道客户与临床观众关注的，是公司2024年4月新获注册证的制氧机——该产品被定位为制氧机新标准实施后的首张注册证产品，拥有5项专利证书与1项软件著作权。其中医用分子筛制氧机X500EW、X550EW、X500W等型号备受瞩目。</p>

      <h3>展会叙事：更安全、更好用、更能交付</h3>

      <p><strong>合规与可靠性——为什么能进更多渠道：</strong>制氧机以"新标准首证"的合规站位切入，叠加公司质量管理体系认证与多国/地区注册路径，给经销商、连锁药房、电商渠道更强的合作确定性。</p>

      <div class="highlight-box">
        <p><strong>体验差异——为什么终端愿意选：</strong>现场重点展示了雾化可调+一键式操作的门诊/居家易用性，两级降噪设计（≤42dB）对夜间长期使用的友好体验，以及药物利用率与雾化颗粒细腻度对呼吸给药体验的显著提升。</p>
      </div>

      <p><strong>交付能力——为什么现在敢谈大单：</strong>同步释放的核心信号是：随着2024年3月二期工程投产后产能提升约150%，新品制氧机与成熟SKU（雾化器/吸痰器等）都进入更稳定的批量交付节奏，这对连锁渠道、集采项目与海外订单尤为关键。</p>

      <h3>展会成果</h3>
      <p>据展期反馈，星米医疗在CMEF期间主要收获集中在：与国内渠道/连锁药房/电商平台完成新一轮选品对接；与基层医疗机构/民营医院/护理机构就呼吸设备配置清单做方案沟通；与东南亚及中东意向客户（对接泰国、越南等已准入市场）推进后续打样与交付排期。</p>

      <h3>全场景呼吸生态</h3>
      <p>星米医疗制氧机、雾化器、吸痰器、电动洗鼻器等呼吸类产品，主要覆盖医用/家用氧疗、呼吸道给药雾化、气道分泌物管理与鼻腔护理四大日常高频场景，面向医院门诊、住院部、ICU/急诊转运、社区/基层诊所、家庭长期照护提供成套设备与配件方案。</p>
    `
  },
  "202407": {
    title: "星米医疗启动BSI-MDR国际认证：对标欧盟最高标准，剑指高端海外市场",
    date: "2024年7月",
    body: `
      <p>2024年7月，星米医疗（Xingmi Medical）正式宣布启动由英国标准协会（BSI）辅导的国际质量管理体系升级项目，同步开启核心产品——压缩空气式雾化器与便携式吸痰器的欧盟MDR（医疗器械法规）认证工作。这标志着星米医疗的质量管理体系向"国际化、精细化、全生命周期化"迈进关键一步，为公司产品进入欧盟及全球高端主流市场拿到了至关重要的"入场券"。</p>

      <h3>体系升维：牵手BSI，构筑国际合规防线</h3>
      <p>面对全球医疗器械监管日益严苛的趋势，星米医疗选择与国际权威认证机构BSI深度合作。不同于基础的ISO 13485体系，本次升级重点在于建立符合MDR法规要求的质量管理体系（QMS）。</p>

      <div class="highlight-box">
        <p>这不仅是对设计开发、生产制造、上市后监督（PMS）等环节的全面重塑，更是对星米医疗"零缺陷"质量文化的极限考验。通过引入BSI的先进审核理念，星米医疗旨在打造一套可经受欧盟公告机构严格审查的卓越管理体系。</p>
      </div>

      <h3>产品攻坚：雾化与吸痰双剑齐发，瞄准CE-MDR认证</h3>
      <p>作为星米医疗出口海外的"拳头产品"，压缩空气式雾化器与便携式吸痰器被选定为首批进行MDR认证的主力机型。相较于旧版的MDD指令，欧盟MDR法规在技术文档（TD）、临床评估（CER）及上市后监督（PMS）等方面提出了指数级增长的合规要求。</p>
      <p>星米医疗提前布局，利用自身持有的多项专利技术与成熟的泰国、越南市场准入经验，全力冲刺CE-MDR证书，以期在竞争激烈的欧洲市场占据一席之地。</p>

      <h3>全球棋局：从"产品出海"迈向"品牌出海"</h3>
      <p>"MDR认证是星米医疗全球化战略的分水岭。"星米医疗注册事务部负责人表示，"随着二期工厂产能的释放和新品制氧机的上市，我们必须用最高的国际标准来倒逼内部管理升级。此次启动BSI-MDR项目，不仅是为了满足合规要求，更是为了向全球客户证明星米医疗具备提供世界级医疗解决方案的能力。"</p>
    `
  },
  "202504": {

  "202505": {
    title: "星米医疗亮相CMEF 2025：全场景制氧解决方案领衔，静音长寿命技术定义行业新标杆",
    date: "2025年5月",
    body: `
      <p>2025年5月，星米医疗（Xingmi Medical）携核心新品矩阵重磅亮相第91届中国国际医疗器械博览会（CMEF Spring, Shanghai）。本次展会，星米医疗以"静音·节能·长效"为技术主轴，全球首次公开展示了采用VPSA法四缸压缩技术的X500CW制氧机，以及覆盖家用、车载、弥散式及呼吸护理领域的共七大SKU，全面展现了其从单一设备制造商向"全场景呼吸健康解决方案提供商"的战略跃迁。</p>

      <h3>旗舰突破：VPSA四缸技术，重新定义"静音与长寿"</h3>
      <p>在本次展会最受瞩目的位置，星米医疗展出了其划时代产品——<strong>X500CW医用分子筛制氧机</strong>。该产品搭载创新的VPSA（真空变压吸附）法四缸压缩机技术，实现了三大核心指标的颠覆性突破：</p>
      <ol style="line-height:2;padding-left:20px;">
        <li><strong>极致静音：</strong>运行噪音低至<strong>34分贝</strong>，达到图书馆级静谧标准，彻底解决传统制氧机扰民痛点</li>
        <li><strong>超低功耗：</strong>功率稳定在175W-250W区间，较同类产品节能显著，降低用户长期使用成本</li>
        <li><strong>超长寿命：</strong>核心部件寿命设计比传统制氧机延长一倍，大幅降低医疗机构与家庭的设备置换频率</li>
      </ol>
      <p>X500CW的亮相，标志着星米医疗在高端制氧设备领域的研发实力已跻身行业前列。</p>

      <div class="highlight-box">
        <p><strong>VPSA vs 传统PSA：</strong>真空变压吸附技术在更低压力下实现分子筛再生，能耗降低约30%，压缩机磨损大幅减少，这是34dB超静音与双倍寿命的核心技术底座。</p>
      </div>

      <h3>全场景覆盖：从高性价比到特种定制</h3>
      <p>针对不同细分市场需求，星米医疗构建了极具竞争力的产品梯队：</p>
      <ul style="line-height:2;">
        <li><strong>高性价比系列 X500A/BW：</strong>凭借优异的成本控制与可靠性能，成为基层医疗机构与预算敏感型家庭的首选</li>
        <li><strong>智能质价比系列 X500EW/X500W：</strong>集成低噪运行、浓度实时监测与智能报警系统，以"高质价比"切入中高端家用市场</li>
        <li><strong>移动氧疗方案：</strong>专为车载场景设计的5升车载制氧机，具备低电压启动与抗颠簸性能，并已针对旅游大巴等特殊场景推出定制化版本</li>
        <li><strong>弥散式供氧：</strong>弥散制氧机以安装简易、能耗极低、智能恒氧为特点，适用于高原酒店、办公室及家庭卧室的整体增氧</li>
      </ul>

      <h3>护理配套：高流量吸痰与超静音雾化的协同出击</h3>
      <p>除了制氧主线，星米医疗同步展出了呼吸治疗配套产品：新款高流量吸痰器优化了负压调节精度与管路连接密封性；超静音压缩雾化器延续专利优势，进一步降低运行噪音，改善儿童及老人雾化治疗的依从性。</p>

      <h3>战略展望：技术驱动下的全球布局</h3>
      <p>"2025年是星米医疗的产品大年。"星米医疗市场总监表示，"从X500CW的VPSA黑科技，到覆盖'固定+移动+弥散'的全场景制氧方案，我们致力于用技术创新解决临床与用户的真实痛点。结合近期将获得的BSI ISO 13485认证及MDR认证进展，星米医疗已准备好向全球市场输出更高品质的中国智造产品。"</p>
    `
  },
  "202506": {
    title: "星米医疗连续入选｜顺利通过2025年度国家科技型中小企业评价入库，创新底盘再获国家级背书",

      <table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;">
        <thead>
          <tr style="background:#F1F5F9;">
            <th style="padding:8px 12px;border:1px solid #E2E8F0;text-align:left;">评价维度</th>
            <th style="padding:8px 12px;border:1px solid #E2E8F0;text-align:left;">星米医疗的落地表现</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="padding:8px 12px;border:1px solid #E2E8F0;">科技人员占比</td>
            <td style="padding:8px 12px;border:1px solid #E2E8F0;">研发/工程岗位配置到位（参保人员规模十余人的紧凑型团队中，研发职能明确分离）</td>
          </tr>
          <tr style="background:#FAFBFE;">
            <td style="padding:8px 12px;border:1px solid #E2E8F0;">研发投入强度</td>
            <td style="padding:8px 12px;border:1px solid #E2E8F0;">研发费用归集合规——制氧机新标首证的5项专利+1项软著、雾化器/吸痰器双专利、洗鼻器双专利+软著，全部可追溯</td>

            <td style="padding:8px 12px;border:1px solid #E2E8F0;">知识产权得分</td>

      <h3>资质叠加效应：民营科技企业（4月）+ 科技型中小企业（6月）= 梯度培育双保险</h3>
      <ul style="line-height:2;">
